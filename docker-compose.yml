version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    volumes:
      - .:/app
    command: flask run --host=0.0.0.0

  prod:
    build: .
    ports:
      - "8000:5000"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
